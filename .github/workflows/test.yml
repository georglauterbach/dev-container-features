---
name: Test
run-name: Test

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
    paths:
      - src/**
      - test/**
      - .github/workflows
  push:
    branches: [ main ]
    paths:
      - src/**
      - test/**
      - .github/workflows

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  scenarios:
    name: Test Scenarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Acquire Dependencies
        run: sh ./scripts/acquire_dependencies.sh

      - name: Generating tests scenarios
        run: devcontainer features test --skip-duplicated --skip-autogenerated .
